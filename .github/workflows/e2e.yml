name: Playwright E2E

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    # Nightly at 02:00 IST = 20:30 UTC
    - cron: "30 20 * * *"
  workflow_dispatch:
    inputs:
      grep:
        description: "Test grep pattern (e.g. G1, G5)"
        required: false
        default: ""

jobs:
  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (Chromium only for CI speed)
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests (Chromium only in CI)
        env:
          FRONTEND_URL: https://school-dev.zydenlabs.com
          BACKEND_URL: https://school-api-dev.zydenlabs.com
          AUTH_URL: https://auth-dev.zydenlabs.com
          POSTGRES_QA_WRITER_URL: ${{ secrets.POSTGRES_QA_WRITER_URL }}
          CI: "true"
        run: |
          if [ -n "${{ github.event.inputs.grep }}" ]; then
            npx playwright test --project=chromium --grep "${{ github.event.inputs.grep }}"
          else
            npx playwright test --project=chromium
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_id }}
          path: test-results/
          retention-days: 7

  notify-on-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: e2e
    if: failure() && github.event_name == 'schedule'
    steps:
      - name: Send failure notification
        # Add Slack/email integration here when SLACK_WEBHOOK_URL secret is set
        # For now, the GitHub Actions "Notify on failure" email is automatic
        # when the repo has email notifications configured.
        run: |
          echo "E2E tests failed on nightly run. Check the Playwright report artifact."
          echo "Run ID: ${{ github.run_id }}"
          echo "Branch: ${{ github.ref_name }}"
          # TODO: curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} -d '{"text":"E2E nightly failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
